<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Partner Organization — Orleans Civic Engagement Platform</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
</head>
<body>
<header class="site"><div><h1>Community Partner Organization</h1><div class="tag">Orleans Civic Engagement Platform</div></div><a href="index.html" style="color:#FFD700">&larr; Back to dashboard</a></header>
<main class="site">
<div class="form-wrap">
  <div id="form-view">
    <form id="pform">
      <div class="field"><label>Organization Name *</label><input type="text" id="org_name" required></div>
      <div class="field"><label>Contact Name</label><input type="text" id="contact_name"></div>
      <div class="field"><label>Contact Email/Phone</label><input type="text" id="contact_info"></div>
      <div class="field"><label>Type</label>
        <select id="org_type"><option value="">Select one</option>
          <option>Nonprofit</option><option>Church/Faith Org</option><option>School</option><option>Business</option><option>Neighborhood Association</option><option>Other</option>
        </select>
      </div>
      <div class="field"><label>Neighborhood/Precinct Served</label><input type="text" id="area_served"></div>
      <div class="field"><label>Relationship Status</label>
        <select id="status"><option>Not Contacted</option><option>Contacted</option><option>Meeting Scheduled</option><option>Active Partner</option></select>
      </div>
      <div class="field"><label>Notes</label><textarea id="notes"></textarea></div>
      <button type="submit" class="primary">Submit</button>
      <div id="err" style="color:#ff8a80;margin-top:12px;"></div>
    </form>
  </div>
  <div id="success-view" style="display:none">
    <div class="success-box"><h2>Added!</h2><p>Partner organization added to the tracker.</p>
    <p><a href="partner-form.html">Add another</a> &middot; <a href="index.html">Back to dashboard</a></p></div>
  </div>
</div>
</main>
<script>
document.getElementById('pform').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const row = {
    org_name: document.getElementById('org_name').value,
    contact_name: document.getElementById('contact_name').value,
    contact_info: document.getElementById('contact_info').value,
    org_type: document.getElementById('org_type').value,
    area_served: document.getElementById('area_served').value,
    status: document.getElementById('status').value,
    notes: document.getElementById('notes').value
  };
  const { error } = await sb.from('community_partners').insert([row]);
  if(error){ document.getElementById('err').textContent = 'Something went wrong: ' + error.message; return; }
  document.getElementById('form-view').style.display='none';
  document.getElementById('success-view').style.display='block';
});
</script>
</body></html>
