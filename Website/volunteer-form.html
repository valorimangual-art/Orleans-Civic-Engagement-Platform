<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting to Volunteer Form</title>
<script>
(function () {
  const target = new URL('admin/volunteer-form.html', window.location.href);
  target.search = window.location.search;
  target.hash = window.location.hash;
  window.location.replace(target.href);
})();
</script>
</head>
<body>
<p>Redirecting to <a id="destination" href="admin/volunteer-form.html">Volunteer Form</a>…</p>
<script>
const link = document.getElementById('destination');
link.search = window.location.search;
link.hash = window.location.hash;
</script>
</body>
</html>
