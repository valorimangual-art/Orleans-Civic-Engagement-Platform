<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Detail — Orleans Parish Civic OS</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
</head>
<body>
<div style="display:flex;flex-direction:column;min-height:100vh">
<header class="site">
  <div class="brand">ORLEANS PARISH <span class="accent">CIVIC OS</span></div>
  <nav class="site"><a href="events.html">&larr; Back to Events</a></nav>
</header>
<main class="site">
  <div id="not-found" class="card card-pad" style="display:none;background:#f2e3e2;border-color:#e3c9c8">
    <span class="td" style="color:#8f3b39">Event not found. It may have been logged before this page existed &mdash; check <a href="events.html">Events</a>.</span>
  </div>
  <div id="content" style="display:none">
    <div class="page-title" id="event-title" style="margin-bottom:4px"></div>
    <div class="td-muted" id="event-sub" style="margin-bottom:18px"></div>

    <div class="stat-grid" id="stat-cards" style="margin-bottom:18px"></div>

    <div class="card card-pad" style="margin-bottom:18px" id="notes-card">
      <div class="card-title">Notes</div>
      <div class="td" id="event-notes"></div>
    </div>

    <div class="card card-pad" style="margin-bottom:18px">
      <div class="card-title">Volunteer Roster</div>
      <div id="roster-empty" class="td-muted" style="font-size:13px;display:none">No volunteers logged for this event yet.</div>
      <div style="overflow-x:auto">
      <table class="data-table" style="min-width:640px" id="roster-table">
        <thead><tr class="th"><th style="padding:10px 12px">Name</th><th>Role</th><th>Hours</th><th>Score</th><th>Contact</th></tr></thead>
        <tbody id="roster-rows"></tbody>
      </table>
      </div>
    </div>

    <div class="card card-pad">
      <div class="card-title">Add to Roster</div>
      <div class="form-wrap" style="max-width:520px">
        <form id="rform">
          <div class="field"><label>Volunteer *</label>
            <select id="volunteer_uid" required><option value="">Select a volunteer</option></select>
          </div>
          <div class="field"><label>Role</label>
            <select id="role"><option value="">Select one</option>
              <option>Canvassing</option><option>Tabling</option><option>Phone Banking</option>
              <option>Data Entry</option><option>Driving</option><option>Translation</option><option>Event Lead</option>
            </select>
          </div>
          <div class="field"><label>Hours</label><input type="number" step="0.25" id="hours"></div>
          <div class="field"><label>Score (optional, 1&ndash;5)</label><input type="number" min="1" max="5" id="score">
            <div class="hint">Optional &mdash; leave blank if you're not scoring shifts.</div></div>
          <div class="field"><label>Notes</label><textarea id="rnotes"></textarea></div>
          <button type="submit" class="primary">+ Add to Roster</button>
          <div id="rerr" style="color:#8f3b39;margin-top:12px;"></div>
        </form>
      </div>
    </div>
  </div>
</main>
</div>
<script>
const params = new URLSearchParams(location.search);
const eventUid = params.get('event');
let volunteersById = {};

async function load(){
  if(!eventUid){ document.getElementById('not-found').style.display='block'; return; }

  const [evRes, volRes] = await Promise.all([
    sb.from('outreach_events').select('*').eq('event_uid', eventUid),
    sb.from('volunteers').select('*').order('name'),
  ]);
  const event = (evRes.data||[])[0];
  if(!event){ document.getElementById('not-found').style.display='block'; return; }

  (volRes.data||[]).forEach(v=>{ if(v.volunteer_uid) volunteersById[v.volunteer_uid]=v; });
  populateVolunteerSelect(volRes.data||[]);

  document.getElementById('content').style.display='block';
  document.getElementById('event-title').textContent = event.event_name || '(untitled event)';
  document.getElementById('event-sub').textContent = [event.event_date, event.location, event.precinct_ward, event.event_type].filter(Boolean).join(' · ');
  document.getElementById('event-notes').textContent = event.notes || '—';
  document.getElementById('notes-card').style.display = event.notes ? 'block' : 'none';

  const notReg = (event.could_not_register_no_id||0)+(event.could_not_register_felony||0)+(event.could_not_register_other||0);
  document.getElementById('stat-cards').innerHTML = [
    ['New Registrations', event.new_registrations||0],
    ['Found Already Registered', event.found_already_registered||0],
    ['Found Inactive', event.found_inactive||0],
    ['Could Not Register', notReg],
  ].map(([label,val])=>`<div class="card stat-card"><div class="th">${label}</div><div class="stat-value">${val}</div></div>`).join('')
  + (notReg ? `<div class="td-muted" style="grid-column:1/-1;font-size:12px">Could not register breakdown &mdash; No ID: ${event.could_not_register_no_id||0}, Felony: ${event.could_not_register_felony||0}, Other: ${event.could_not_register_other||0}</div>` : '');

  await loadRoster();
}

async function loadRoster(){
  const { data } = await sb.from('event_volunteers').select('*, volunteers(name,phone,email,volunteer_uid)').eq('event_uid', eventUid).order('created_at');
  const rows = data||[];
  document.getElementById('roster-empty').style.display = rows.length ? 'none' : 'block';
  document.getElementById('roster-table').style.display = rows.length ? '' : 'none';
  document.getElementById('roster-rows').innerHTML = rows.map(r=>{
    const v = r.volunteers || {};
    const name = v.volunteer_uid ? `<a href="volunteer-detail.html?v=${encodeURIComponent(v.volunteer_uid)}">${v.name||'(unknown)'}</a>` : (v.name||'(unknown)');
    return `<tr class="td">
      <td style="padding:9px 12px">${name}</td><td class="td-muted">${r.role||''}</td>
      <td>${r.hours!=null ? r.hours : ''}</td><td>${r.score!=null ? r.score : ''}</td>
      <td class="td-muted">${[v.phone,v.email].filter(Boolean).join(' / ')}</td></tr>`;
  }).join('');
}

function populateVolunteerSelect(vols){
  const sel = document.getElementById('volunteer_uid');
  vols.filter(v=>v.volunteer_uid).forEach(v=>{
    const o = document.createElement('option'); o.value = v.volunteer_uid; o.textContent = v.name; sel.appendChild(o);
  });
}

document.getElementById('rform').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const row = {
    event_uid: eventUid,
    volunteer_uid: document.getElementById('volunteer_uid').value,
    role: document.getElementById('role').value,
    hours: document.getElementById('hours').value ? parseFloat(document.getElementById('hours').value) : null,
    score: document.getElementById('score').value ? parseInt(document.getElementById('score').value) : null,
    notes: document.getElementById('rnotes').value,
  };
  const { error } = await sb.from('event_volunteers').insert([row]);
  if(error){ document.getElementById('rerr').textContent = 'Something went wrong: ' + error.message; return; }
  document.getElementById('rerr').textContent = '';
  document.getElementById('rform').reset();
  await loadRoster();
});

load();
</script>
</body>
</html>
