<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volunteer Detail — Orleans Parish Civic OS</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
</head>
<body>
<div style="display:flex;flex-direction:column;min-height:100vh">
<header class="site">
  <div class="brand">ORLEANS PARISH <span class="accent">CIVIC OS</span></div>
  <nav class="site"><a href="volunteers.html">&larr; Back to Volunteers</a></nav>
</header>
<main class="site">
  <div id="loading" class="card card-pad"><span class="td-muted">Loading volunteer…</span></div>
  <div id="state-message" class="card card-pad" style="display:none"></div>
  <div id="content" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:4px">
      <div class="page-title" style="margin:0" id="v-name"></div>
      <span class="chip" id="v-status"></span>
    </div>
    <div class="td-muted" id="v-sub" style="margin-bottom:18px"></div>

    <div class="stat-grid" id="stat-cards" style="margin-bottom:18px"></div>

    <div class="card card-pad" style="margin-bottom:18px">
      <div class="card-title">Volunteer Info</div>
      <div style="display:flex;flex-direction:column;gap:8px" id="info-rows"></div>
    </div>

    <div class="card card-pad">
      <div class="card-title">Shift History</div>
      <div id="shifts-empty" class="td-muted" style="font-size:13px;display:none">No shifts logged for this volunteer yet.</div>
      <div style="overflow-x:auto">
      <table class="data-table" style="min-width:640px" id="shifts-table">
        <thead><tr class="th"><th style="padding:10px 12px">Date</th><th>Event</th><th>Precinct/Ward</th><th>Role</th><th>Hours</th></tr></thead>
        <tbody id="shifts-rows"></tbody>
      </table>
      </div>
    </div>
  </div>
</main>
</div>
<script>
const statusColors = {New:'#2560b0', Contacted:'#7d652a', Active:'#3f6b48', Inactive:'#8f3b39'};
const params = new URLSearchParams(location.search);
const volunteerParam = params.get('v');
const volunteerId = /^[1-9]\d*$/.test(volunteerParam||'') ? volunteerParam : null;

function escapeHtml(value){
  return String(value ?? '').replace(/[&<>"']/g, ch=>({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  })[ch]);
}

function showState(kind, message){
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'none';
  const el = document.getElementById('state-message');
  el.style.display = 'block';
  el.style.background = kind==='error' ? '#f2e3e2' : '#fff';
  el.style.borderColor = kind==='error' ? '#e3c9c8' : '#dedad0';
  el.innerHTML = `<span class="td"${kind==='error'?' style="color:#8f3b39"':''}>${escapeHtml(message)}</span> <a href="volunteers.html">Back to Volunteers</a>`;
}

async function load(){
  if(!volunteerId){ showState('error','Invalid volunteer identifier.'); return; }

  const { data: v, error } = await sb.from('volunteers')
    .select('id,name,phone,email,home_precinct,skills,languages,transportation,availability,status')
    .eq('id', volunteerId)
    .maybeSingle();
  if(error){ console.error('Unable to load volunteer:', error); showState('error','Unable to load this volunteer.'); return; }
  if(!v){ showState('not-found','Volunteer not found.'); return; }

  document.getElementById('loading').style.display='none';
  document.getElementById('content').style.display='block';
  document.getElementById('v-name').textContent = v.name || '(unnamed)';
  const c = statusColors[v.status]||'#666';
  const statusEl = document.getElementById('v-status');
  statusEl.textContent = v.status || 'New';
  statusEl.style.background = c+'22'; statusEl.style.color = c;
  document.getElementById('v-sub').textContent = [v.home_precinct, v.phone, v.email].filter(Boolean).join(' · ');

  document.getElementById('info-rows').innerHTML = [
    ['Skills', v.skills], ['Languages', v.languages], ['Transportation', v.transportation], ['Availability', v.availability],
  ].map(([label,val])=>`<div style="display:flex;justify-content:space-between;border-bottom:1px solid #f0ece2;padding-bottom:7px">
    <span class="th">${label}</span><span class="td">${escapeHtml(val||'—')}</span></div>`).join('');

  await loadShifts();
}

async function loadShifts(){
  const { data, error } = await sb.from('volunteer_event_hours')
    .select('id,volunteer_id,event_id,hours,role,created_at,outreach_events(id,event_name,event_date,precinct_ward)')
    .eq('volunteer_id', volunteerId)
    .order('created_at',{ascending:false});
  if(error){
    console.error('Unable to load volunteer shift history:', error);
    document.getElementById('shifts-empty').textContent = 'Unable to load shift history.';
    document.getElementById('shifts-empty').style.display = 'block';
    document.getElementById('shifts-table').style.display = 'none';
    return;
  }
  const rows = data||[];

  const totalHours = rows.reduce((s,r)=>s+(parseFloat(r.hours)||0),0);

  document.getElementById('stat-cards').innerHTML = [
    ['Total Shifts', rows.length],
    ['Total Hours', totalHours],
  ].map(([label,val])=>`<div class="card stat-card"><div class="th">${label}</div><div class="stat-value">${val}</div></div>`).join('');

  document.getElementById('shifts-empty').style.display = rows.length ? 'none' : 'block';
  document.getElementById('shifts-table').style.display = rows.length ? '' : 'none';
  document.getElementById('shifts-rows').innerHTML = rows.map(r=>{
    const ev = r.outreach_events || {};
    const eventName = escapeHtml(ev.event_name||'(untitled event)');
    const eventLink = ev.id ? `<a href="event-detail.html?event=${encodeURIComponent(ev.id)}">${eventName}</a>` : eventName;
    return `<tr class="td">
      <td style="padding:9px 12px">${escapeHtml(ev.event_date)}</td><td>${eventLink}</td><td class="td-muted">${escapeHtml(ev.precinct_ward)}</td>
      <td class="td-muted">${escapeHtml(r.role)}</td><td>${escapeHtml(r.hours)}</td></tr>`;
  }).join('');
}

load();
</script>
</body>
</html>
