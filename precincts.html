<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Precincts — Orleans Parish Civic OS</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
</head>
<body>
<div style="display:flex;flex-direction:column;min-height:100vh">
<header class="site">
  <div class="brand">ORLEANS PARISH <span class="accent">CIVIC OS</span></div>
  <nav class="site">
    <a href="index.html">Overview</a>
    <a href="map.html">Map</a>
    <a href="precincts.html" class="active">Precincts</a>
    <a href="priority-list.html">Priority List</a>
    <a href="volunteers.html">Volunteers</a>
    <a href="polling-locations.html">Polling Locations</a>
    <a href="events.html">Events</a>
    <a href="partners.html">Partners</a>
    <a href="opportunities.html">Opportunities</a>
  </nav>
</header>
<main class="site">
  <div class="page-title">Precincts</div>
  <div class="toolbar">
    <input type="text" id="search" placeholder="Search precinct, neighborhood, polling location...">
    <select id="f-ward"><option value="">All Wards</option></select>
    <select id="f-council"><option value="">All Council Districts</option></select>
    <select id="f-planning"><option value="">All Planning Districts</option></select>
  </div>
  <div class="th" id="count" style="margin-bottom:8px"></div>
  <div class="card" style="overflow-x:auto">
    <table class="data-table" style="min-width:900px">
      <thead><tr class="th">
        <th data-k="pw" style="cursor:pointer;padding:10px 12px">Precinct</th>
        <th data-k="ward" style="cursor:pointer">Ward</th>
        <th data-k="council" style="cursor:pointer">Council</th>
        <th data-k="planning" style="cursor:pointer">Planning Dist.</th>
        <th>Neighborhood</th>
        <th data-k="reg" style="cursor:pointer">Registered</th>
        <th data-k="vap" style="cursor:pointer">Adult Pop.</th>
        <th data-k="rate" style="cursor:pointer">Reg. Rate</th>
        <th data-k="confirmed" style="cursor:pointer">Confirmed New</th>
        <th data-k="projected" style="cursor:pointer">Projected</th>
        <th data-k="inactiveFound" style="cursor:pointer">Found Inactive</th>
        <th data-k="unsure" style="cursor:pointer">Unsure</th>
        <th>Polling Location</th>
      </tr></thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
</main>
</div>
<script>
function pct(r){ return (r==null||isNaN(r)) ? '—' : (r*100).toFixed(1)+'%'; }
function rateColor(r){ if(r==null) return '#999'; if(r<0.60) return '#a94442'; if(r<0.85) return '#b8963f'; return '#5f8f6d'; }

let DATA = [];
let sortState = {key:'pw', dir:1};

async function load(){
  const [precRes, evRes] = await Promise.all([
    sb.from('precincts').select('*'),
    sb.from('outreach_events').select('*'),
  ]);
  const events = evRes.data || [];
  const byPrecinct = {};
  events.forEach(e=>{
    const k = e.precinct_ward; if(!k) return;
    if(!byPrecinct[k]) byPrecinct[k] = {confirmed:0, projected:0, inactiveFound:0, unsure:0};
    if(e.confirmed) byPrecinct[k].confirmed += (e.new_registrations||0);
    else byPrecinct[k].projected += (e.new_registrations||0);
    byPrecinct[k].inactiveFound += (e.voters_found_inactive||0);
    byPrecinct[k].unsure += (e.unsure_registration_status||0);
  });
  DATA = (precRes.data||[]).map(p=>{
    const agg = byPrecinct[p.precinct_ward] || {confirmed:0, projected:0, inactiveFound:0, unsure:0};
    return {
      pw:p.precinct_ward, ward:p.ward, council:p.council_district, planning:p.planning_district,
      neighborhood:p.neighborhood, reg:p.registered_voters, vap:p.adult_population, rate:p.registration_rate,
      polling:p.polling_location, ...agg
    };
  });
  populateFilters();
  render();
}

function populateFilters(){
  [...new Set(DATA.map(p=>p.ward))].sort((a,b)=>a-b).forEach(v=>{ const o=document.createElement('option'); o.value=v; o.textContent=v; document.getElementById('f-ward').appendChild(o); });
  [...new Set(DATA.map(p=>p.council))].sort().forEach(v=>{ const o=document.createElement('option'); o.value=v; o.textContent=v; document.getElementById('f-council').appendChild(o); });
  [...new Set(DATA.map(p=>p.planning))].sort().forEach(v=>{ const o=document.createElement('option'); o.value=v; o.textContent=v; document.getElementById('f-planning').appendChild(o); });
}

function render(){
  const q = document.getElementById('search').value.toLowerCase();
  const ward = document.getElementById('f-ward').value, council = document.getElementById('f-council').value, planning = document.getElementById('f-planning').value;
  let rows = DATA.filter(p=>{
    if(ward && String(p.ward)!==ward) return false;
    if(council && p.council!==council) return false;
    if(planning && p.planning!==planning) return false;
    if(q && !((p.pw||'').toLowerCase().includes(q) || (p.neighborhood||'').toLowerCase().includes(q) || (p.polling||'').toLowerCase().includes(q))) return false;
    return true;
  });
  rows.sort((a,b)=>{ let av=a[sortState.key], bv=b[sortState.key]; if(av==null) av=sortState.dir===1?Infinity:-Infinity; if(bv==null) bv=sortState.dir===1?Infinity:-Infinity; if(typeof av==='string') return av.localeCompare(bv)*sortState.dir; return (av-bv)*sortState.dir; });
  document.getElementById('count').textContent = rows.length + ' of ' + DATA.length + ' precincts';
  document.getElementById('rows').innerHTML = rows.map(p=>`<tr class="td">
    <td style="padding:9px 12px"><a href="precinct-detail.html?pw=${encodeURIComponent(p.pw)}">${p.pw}</a></td>
    <td><a href="ward-detail.html?ward=${p.ward}">${p.ward}</a></td><td>${p.council}</td><td>${p.planning}</td><td class="td-muted">${p.neighborhood||''}</td>
    <td>${p.reg}</td><td>${p.vap||'—'}</td><td><span class="chip" style="background:${rateColor(p.rate)}22;color:${rateColor(p.rate)}">${pct(p.rate)}</span></td>
    <td style="color:#3f6b48">${p.confirmed||''}</td>
    <td style="color:#b8963f">${p.projected||''}</td>
    <td style="color:#a94442">${p.inactiveFound||''}</td>
    <td class="td-muted">${p.unsure||''}</td>
    <td class="td-muted">${p.polling||''}</td></tr>`).join('');
}
['search','f-ward','f-council','f-planning'].forEach(id=> document.getElementById(id).addEventListener('input', render));
document.querySelectorAll('th[data-k]').forEach(th=> th.addEventListener('click', ()=>{ const k=th.dataset.k; sortState.dir = sortState.key===k? -sortState.dir:1; sortState.key=k; render(); }));

load();
</script>
</body>
</html>
