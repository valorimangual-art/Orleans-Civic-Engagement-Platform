<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outreach Opportunity Scout — Orleans Civic Engagement Platform</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
</head>
<body>
<header class="site"><div><h1>Outreach Opportunity Scout</h1><div class="tag">Orleans Civic Engagement Platform</div></div><a href="index.html" style="color:#FFD700">&larr; Back to dashboard</a></header>
<main class="site">
<div class="form-wrap">
  <div id="form-view">
    <form id="oform">
      <div class="field"><label>Event/Opportunity Name *</label><input type="text" id="opportunity_name" required></div>
      <div class="field"><label>Date or Recurring?</label><input type="text" id="event_date" placeholder="e.g. July 26, or 'every Saturday'"></div>
      <div class="field"><label>Location</label><input type="text" id="location"></div>
      <div class="field"><label>Estimated Foot Traffic</label>
        <select id="foot_traffic"><option value="">Select one</option><option>Low</option><option>Medium</option><option>High</option></select>
      </div>
      <div class="field"><label>Contact to Attend</label><input type="text" id="contact"></div>
      <div class="field"><label>Status</label>
        <select id="status"><option>Identified</option><option>Contacted</option><option>Confirmed</option><option>Attended</option><option>Passed</option></select>
      </div>
      <div class="field"><label>Notes</label><textarea id="notes"></textarea></div>
      <button type="submit" class="primary">Submit</button>
      <div id="err" style="color:#ff8a80;margin-top:12px;"></div>
    </form>
  </div>
  <div id="success-view" style="display:none">
    <div class="success-box"><h2>Added!</h2><p>Opportunity added to the tracker.</p>
    <p><a href="opportunity-form.html">Add another</a> &middot; <a href="index.html">Back to dashboard</a></p></div>
  </div>
</div>
</main>
<script>
document.getElementById('oform').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const row = {
    opportunity_name: document.getElementById('opportunity_name').value,
    event_date: document.getElementById('event_date').value,
    location: document.getElementById('location').value,
    foot_traffic: document.getElementById('foot_traffic').value,
    contact: document.getElementById('contact').value,
    status: document.getElementById('status').value,
    notes: document.getElementById('notes').value
  };
  const { error } = await sb.from('outreach_opportunities').insert([row]);
  if(error){ document.getElementById('err').textContent = 'Something went wrong: ' + error.message; return; }
  document.getElementById('form-view').style.display='none';
  document.getElementById('success-view').style.display='block';
});
</script>
</body></html>
