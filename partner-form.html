<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Partner Org — Orleans Parish Civic OS</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
</head>
<body>
<div style="display:flex;flex-direction:column;min-height:100vh">
<header class="site">
  <div class="brand">ORLEANS PARISH <span class="accent">CIVIC OS</span></div>
  <nav class="site"><a href="partners.html">&larr; Back to Partners</a></nav>
</header>
<main class="site">
  <div class="page-title">Community Partner Organization</div>
  <div class="form-wrap">
    <div id="form-view">
      <form id="pform">
        <div class="field"><label>Organization Name *</label><input type="text" id="org_name" required></div>
        <div class="field"><label>Contact Name</label><input type="text" id="contact_name"></div>
        <div class="field"><label>Contact Email/Phone</label><input type="text" id="contact_info"></div>
        <div class="field"><label>Type</label>
          <select id="org_type"><option value="">Select one</option>
            <option>Nonprofit</option><option>Church/Faith Org</option><option>School</option><option>Business</option><option>Neighborhood Association</option><option>Other</option>
          </select>
        </div>
        <div class="field"><label>Neighborhood/Precinct Served (description)</label><input type="text" id="area_served"></div>
        <div class="field"><label>Ward (for exact ward-level counting)</label>
          <select id="ward"><option value="">Not tied to one ward</option>
            <option value="1">Ward 1</option><option value="2">Ward 2</option><option value="3">Ward 3</option><option value="4">Ward 4</option>
            <option value="5">Ward 5</option><option value="6">Ward 6</option><option value="7">Ward 7</option><option value="8">Ward 8</option>
            <option value="9">Ward 9</option><option value="10">Ward 10</option><option value="11">Ward 11</option><option value="12">Ward 12</option>
            <option value="13">Ward 13</option><option value="14">Ward 14</option><option value="15">Ward 15</option><option value="16">Ward 16</option><option value="17">Ward 17</option>
          </select>
          <div class="hint">Optional, but set this for an exact ward count instead of a text-match guess.</div>
        </div>
        <div class="field"><label>Relationship Status</label>
          <select id="status"><option>Not Contacted</option><option>Contacted</option><option>Meeting Scheduled</option><option>Active Partner</option></select>
        </div>
        <div class="field"><label>Notes</label><textarea id="notes"></textarea></div>
        <button type="submit" class="primary">Submit</button>
        <div id="err" style="color:#8f3b39;margin-top:12px;"></div>
      </form>
    </div>
    <div id="success-view" style="display:none">
      <div class="card card-pad" style="border-color:#3f6b48;background:#e3ece3">
        <div style="font:800 16px 'Nunito',sans-serif;color:#3f6b48">Added!</div>
        <p class="td">Partner organization added to the tracker.</p>
        <p><a href="partner-form.html">Add another</a> &middot; <a href="partners.html">Back to Partners</a></p>
      </div>
    </div>
  </div>
</main>
</div>
<script>
document.getElementById('pform').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const row = {
    org_name: document.getElementById('org_name').value, contact_name: document.getElementById('contact_name').value,
    contact_info: document.getElementById('contact_info').value, org_type: document.getElementById('org_type').value,
    area_served: document.getElementById('area_served').value,
    ward: document.getElementById('ward').value ? parseInt(document.getElementById('ward').value) : null,
    status: document.getElementById('status').value,
    notes: document.getElementById('notes').value
  };
  const { error } = await sb.from('community_partners').insert([row]);
  if(error){ document.getElementById('err').textContent = 'Something went wrong: ' + error.message; return; }
  document.getElementById('form-view').style.display='none';
  document.getElementById('success-view').style.display='block';
});
</script>
</body>
</html>
